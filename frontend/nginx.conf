server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── index.html : JAMAIS mis en cache ─────────────────────────────────────
    # C'est le point d'entrée SPA — doit toujours être la dernière version
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri /index.html;
    }

    # ── Assets Vite (JS/CSS avec hash dans le nom) : cache long ──────────────
    # Vite génère des noms comme : main-BxK3d9Lm.js, index-Cp8J2mNk.css
    # Le hash change à chaque build → pas de risque de stale cache
    location ~* \.(js|css|woff2|woff|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── Images et autres assets ───────────────────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # ── SPA React : toutes les routes → index.html ───────────────────────────
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API REST ────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass             http://backend:8085;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_http_version     1.1;
        proxy_set_header       Connection "";
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
        proxy_connect_timeout  30s;
        client_max_body_size   500m;
        client_body_timeout    300s;

        # Pas de cache sur les réponses API
        add_header Cache-Control "no-store";
    }

    # ── WebSocket natif ───────────────────────────────────────────────────────
    location /ws-native {
        proxy_pass             http://backend:8085;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
    }

    location /ws {
        proxy_pass             http://backend:8085;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
    }

    # ── Compression gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml font/woff2;
    gzip_min_length 1024;
}