server:
  port: 8085

spring:
  application:
    name: PerfHub

  datasource:
    url: jdbc:h2:file:./data/perfhub;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

perfhub:
  storage:
    root: ./storage
    projects: ./storage/projects
    reports: ./storage/reports

  jwt:
    secret: "perfhub-super-secret-key-change-in-production-2024"
    expiration-ms: 86400000   # 24h

  git:
    ssl-verify: false
    timeout-seconds: 120

logging:
  level:
    com.perfhub: DEBUG
    org.springframework.security: WARN
